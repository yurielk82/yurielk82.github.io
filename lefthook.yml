# Lefthook — 로컬 Git 훅 (pre-commit, commit-msg, pre-push)
#
# 목적: CI 이전 로컬에서 1차 차단. CI만 있으면 터미널 커밋이 무방비.
#
# 설치 (Node.js 프로젝트):
#   npm i -D lefthook
#   npx lefthook install
#
# 설치 (Homebrew):
#   brew install lefthook
#   lefthook install
#
# 참고: https://github.com/evilmartians/lefthook/blob/master/docs/configuration.md

pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{ts,tsx,js,jsx,mjs,cjs}'
      # eslint config 있는 레포만 검사 (Python 레포 등 자동 skip)
      run: |
        if [ -f eslint.config.mjs ] || [ -f eslint.config.cjs ] || [ -f eslint.config.js ] || [ -f .eslintrc.json ] || [ -f .eslintrc.js ] || [ -f .eslintrc.cjs ]; then
          npx eslint --max-warnings 0 {staged_files}
        fi
      skip:
        - merge
        - rebase

    # typecheck는 pre-commit에서 제거 — tsc는 파일 단위 검사 불가라 staged file 1개만 변경해도
    # 누적된 다른 파일 위반이 다 같이 잡혀 commit 차단. Boy Scout과 어긋남.
    # CI(quality-gate.yml)에서 전체 typecheck 강제 + pre-push의 changed-lint가 staged 변경만 strict.

    format:
      glob: '*.{ts,tsx,js,jsx,json,md,css,scss}'
      # prettier config 있는 레포만 검사
      run: |
        if [ -f .prettierrc ] || [ -f .prettierrc.json ] || [ -f .prettierrc.js ] || [ -f prettier.config.js ] || [ -f prettier.config.mjs ]; then
          npx prettier --check {staged_files}
        fi
      skip:
        - merge
        - rebase

    ruff-check:
      glob: '*.py'
      run: ruff check {staged_files}
      skip:
        - merge
        - rebase

    secret-scan-staged:
      # TruffleHog CLI는 별도 설치 필요: brew install trufflehog
      # staged files만 정확히 스캔 — 디렉토리 스캔이 아닌 filesystem 소스로 파일 리스트 전달
      # 참고: TruffleHog v3 `filesystem` subcommand는 파일 경로를 직접 받음
      # 설치 안 돼 있으면 스킵 (로컬 1차 가드일 뿐, CI가 최종 차단)
      run: |
        if command -v trufflehog >/dev/null 2>&1; then
          trufflehog filesystem {staged_files} --results=verified --fail --no-update 2>/dev/null
        else
          echo "ℹ️ trufflehog 미설치 — 로컬 시크릿 스캔 스킵 (CI가 차단). 설치: brew install trufflehog"
        fi
      skip:
        - merge
        - rebase

commit-msg:
  commands:
    commitlint:
      # commitlint config 있는 레포만 검사 (Python 레포 등 자동 skip)
      run: |
        if [ -f commitlint.config.mjs ] || [ -f commitlint.config.cjs ] || [ -f commitlint.config.js ]; then
          npx --yes commitlint --edit {1}
        fi

pre-push:
  commands:
    changed-lint:
      # push 직전 — 새 commit이 건드린 파일만 strict check (Boy Scout)
      # 누적 위반은 CI 또는 정리 스프린트에서. 여기는 회귀 방지만.
      run: |
        if [ ! -f eslint.config.mjs ] && [ ! -f eslint.config.cjs ] && [ ! -f eslint.config.js ] && [ ! -f .eslintrc.json ] && [ ! -f .eslintrc.js ] && [ ! -f .eslintrc.cjs ]; then exit 0; fi
        files=$(git diff --name-only origin/{push_branch}..HEAD 2>/dev/null | grep -E '\.(ts|tsx|js|jsx|mjs|cjs)$' || true)
        if [ -n "$files" ]; then npx eslint --max-warnings 0 $files; fi
      skip:
        - merge
        - rebase
